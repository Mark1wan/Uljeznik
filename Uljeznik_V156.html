    body{ background-color:var(--bg)!important; color:var(--text)!important; }

    .divider{ background:var(--border)!important; }

      background:var(--pillBg)!important;

    }
    .footer{ color:var(--muted)!important; }

    .topToggle span{ color: var(--text)!important; }
    pre.rulesPre{ color: var(--text)!important; opacity: 0.92; }

  function shuffle(arr) {
    const a = arr.slice();
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }

  function parseLines(text) {
    return text.split("\n").map(s => s.trim()).filter(Boolean);
  }

  function parseDictPairs(text) {
    const lines = text.split("\n").map(s => s.trim()).filter(Boolean);
    const pairs = [];
    for (let i = 0; i < lines.length; i += 2) {
      const w = lines[i];
      const t = lines[i + 1] || "";
      if (w && t) pairs.push({ w, t });
      else if (w) {
        const m = w.split(/\s*[-–—:]\s*/);
        if (m.length >= 2) pairs.push({ w: m[0], t: m.slice(1).join(" - ") });
      }
    }
    const seen = new Set();
    return pairs.filter(p => {
      const key = p.w.toUpperCase();
      if (seen.has(key)) return false;
      seen.add(key);
      return true;
    });
  }

  function pickWord() {
    // Dubrovnik-only edition
    if (!dubrovnikPairs.length) return null;
    const entry = dubrovnikPairs[Math.floor(Math.random() * dubrovnikPairs.length)];
    return { kind: "dubrovnik", w: entry.w, t: entry.t };
  }


  // Hint sanitizer: keep it simple. If a hint is in the global banned set, drop it.
  // (Dynamic hint pools should already prevent translation-leaks; this is just a safety net.)
  const BANNED_HINTS = new Set([
    "šećer", "sugar"
  ]);

  function sanitizeHint(hw) {
    if (!hw) return null;
    const s = String(hw).trim();
    if (!s) return null;
    if (BANNED_HINTS.has(s.toLowerCase())) return null;
    return s;
  }

  function buildImposterHints(picked, wordStr) {
    const hints = [];

    if (hintLen.checked) {
      const len = (wordStr || "").replace(/\s+/g, "").length;
      if (len) hints.push(t("hintLenFmt", len));
    }

    if (hintHard.checked) {
      const keyUpper = (wordStr || "").toUpperCase();
      let hw = null;

      // Prefer explicit hint maps if present
      const hintMap =
        (isEnglish && typeof dubrovnikImposterHintsEN !== "undefined") ? dubrovnikImposterHintsEN :
        (!isEnglish && typeof dubrovnikImposterHintsHR !== "undefined") ? dubrovnikImposterHintsHR :
        (typeof dubrovnikImposterHints !== "undefined") ? dubrovnikImposterHints :
        null;

      if (hintMap && hintMap[keyUpper]) {
        const pool = hintMap[keyUpper];
        if (Array.isArray(pool) && pool.length) {
          hw = pool[Math.floor(Math.random() * pool.length)];
        } else {
          hw = pool;
        }
      }

      // Fallback: derive from definition (offline, no hallucinating)
      if (!hw && picked && picked.t) {
        const base = isEnglish ? hrToEnGloss(picked.t) : picked.t;
        // take the first chunk before comma/semicolon/parentheses
        hw = (base || "").split(/[;,\(]/)[0].trim() || null;
      }

      hw = sanitizeHint(hw, picked);
      if (hw) hints.push(t("hintHardFmt", hw));
    }

    return hints;
  }

  function assignImposters(players, impostersCount) {
    const indices = shuffle(players.map((_, i) => i));
    return new Set(indices.slice(0, impostersCount));
  }

  function newRound(players) {
    const impostersCount = Math.max(1, Math.min(Number(impostersSel.value) || 1, players.length - 1));

    const picked = pickWord();
    if (!picked) return { error: "No words in the selected list." };

    const wordStr = picked.kind === "dubrovnik" ? picked.w : picked.word;

    const impSet = assignImposters(players, impostersCount);

    const assignments = players.map((name, i) => ({
      name,
      isImposter: impSet.has(i),
    }));

    const impHints = buildImposterHints(picked, wordStr);

    return {
      round: (state?.round || 0) + 1,
      players,
      assignments,
      currentIndex: 0,
      picked,
      wordStr,
      impHints
    };
  }

  function updateUI() {
    const total = state.assignments.length;
    const idx = state.currentIndex;
    const p = state.assignments[idx];

    roundInfo.textContent = `${t("roundPrefix")} ${state.round} • ${idx + 1}/${total}`;

    // Player name is shown on the main button (as requested).
    playerLabel.textContent = "";
    nameBtn.textContent = p.name;

    playerHint.textContent = isEnglish
      ? "Hand the phone to that person. Nobody else should look."
      : "Predaj mob toj osobi. Nitko drugi ne bi smio gledati.";

    roleArea.classList.add("hidden");
    nameBtn.disabled = false;
  }

  function reveal() {
    const p = state.assignments[state.currentIndex];
    roleArea.classList.remove("hidden");


    roleText.classList.toggle("imposter", !!p.isImposter);

    if (p.isImposter) {
      roleText.textContent = t("roleImposter");
      if ((state.impHints || []).length) {
        wordText.textContent = t("hintsTitle");
        extraText.textContent = state.impHints.join(" • ");
      } else {
        wordText.textContent = t("noWord");
        extraText.textContent = "";
      }
      return;
    }

    roleText.textContent = t("rolePlayer");

    if (state.picked.kind === "dubrovnik") {
      wordText.textContent = (state.picked.w || "").toUpperCase();
      const gloss = isEnglish ? hrToEnGloss(state.picked.t || "") : (state.picked.t || "(nema prijevoda)");
      extraText.textContent = `${t("dubTranslationLabel")} ${isEnglish ? (gloss || "(no translation)") : (gloss || "(nema prijevoda)")}`;
    } else {
      wordText.textContent = (state.picked.word || "").toUpperCase();
      extraText.textContent = "";
    }
  }

      endRevealArea.classList.add("hidden");
      endRevealText.textContent = "";
      return;

    const imposters = state.assignments.filter(a => a.isImposter).map(a => a.name);
    const impLine = imposters.length ? imposters.join(", ") : "(none?)";

    let wordLine = "";
    if (state.picked.kind === "dubrovnik") {
      const gloss = isEnglish ? hrToEnGloss(state.picked.t || "") : (state.picked.t || "");
      wordLine = `${state.picked.w}\n${t("dubTranslationLabel")} ${gloss || state.picked.t || "(no translation)"}`;
    } else {
      wordLine = `${state.picked.word}`;

    endRevealText.textContent = `${t("revealAlertTitle")} ${impLine}\n\n${t("wordLabel")} ${wordLine}`;

  function startFresh(players = null) {
    const p = players || buildPlayers();
    if (p.length < 3) { alert(t("needPlayers")); return; }

    const next = newRound(p);
    if (next.error) { alert(next.error); return; }

    state = next;
    state.starter = null;
    if (startSuggestion) startSuggestion.textContent = "";

    // Reset round UI
    endRoundControls.classList.add("hidden");
    if (endRevealArea) { endRevealArea.classList.add("hidden"); endRevealText.textContent = ""; }

    showGame();
    updateUI();

startFresh(state.players);

    titleH1.textContent = t("title");
    animateTitle();
    langEnglishLabel.textContent = t("langToggle");
themeSelectLabel.textContent = t("themeLabel");

    // Secret modal
    if (secretTitle) secretTitle.textContent = t("secretTitle");
    if (secretOkBtn) secretOkBtn.textContent = t("secretOk");
    if (secretCancelBtn) secretCancelBtn.textContent = t("secretCancel");
    if (secretInput) secretInput.placeholder = t("secretPlaceholder");
    themeNote.textContent = t("themeNoteText");

    lblNames.textContent = t("names");
    txtNamesHint.textContent = t("namesHint");
    lblImposters.textContent = t("imposters");
    lblHints.textContent = t("hints");
    hintLenText.textContent = t("hintLen");
    hintHardText.textContent = t("hintHard");
    startBtn.textContent = t("start");
    rulesBtn.textContent = t("rules");
    txtPrivacyHint.textContent = t("privacyHint");

    // Buttons in game
    nextPlayerBtn.textContent = t("nextPlayer");
    if (!state) nameBtn.textContent = t("nameButton");
revealImposterBtn.textContent = t("revealImposter");
    nextRoundBtn.textContent = t("nextRound");
    newGameBtn.textContent = t("newGame");
txtReadQuiet.textContent = t("readQuiet");

    // Placeholders (nice-to-have)
    namesTA.placeholder = isEnglish ? "Marko\nAna\nIvo" : "Marko\nAna\nIvo";

    footerCredit.innerHTML = t("footer");

    // If mid-game, update round text too
    if (state) updateUI();
  }

  // Events
  el("startBtn").addEventListener("click", () => startFresh(null));
  el("rulesBtn").addEventListener("click", showRules);

  // Rules modal: close handlers
  const rulesBackdrop = el("rulesBackdrop");
  const rulesCloseBtn = el("rulesCloseBtn");

  if (rulesCloseBtn) rulesCloseBtn.addEventListener("click", hideRules);

  // Click on backdrop (outside modal) closes it
  if (rulesBackdrop) {
    rulesBackdrop.addEventListener("click", (e) => {
      if (e.target === rulesBackdrop) hideRules();
    });
  }

  // ESC closes modal (useful on desktop)
  document.addEventListener("keydown", (e) => {
    if (e.key === "Escape") hideRules();
  });

  el("nameBtn").addEventListener("click", () => {
    if (roleArea.classList.contains("hidden")) reveal();
    else hideRole();
  });
  el("nextPlayerBtn").addEventListener("click", nextPlayer);

  el("revealImposterBtn").addEventListener("click", revealImpostersAndWord);
  el("nextRoundBtn").addEventListener("click", nextRoundSamePlayers);

  el("newGameBtn").addEventListener("click", () => { state = null; nextPlayerBtn.disabled = false; endRoundControls.classList.add("hidden"); showSetup(); });

  // Language toggle
  langEnglish.addEventListener("change", () => {
    isEnglish = !!langEnglish.checked;
    applyLanguageToUI();
  });


  // Theme logic (locked behind secret code)
const THEMES = ['solarpunk', 'paper', 'bloodmoon', 'davinci'];
const THEME_KEY = "uljez-theme";

// IMPORTANT: unlock is SESSION-ONLY (resets when game is closed / refreshed)
let themeUnlocked = false;

function sanitizeTheme(theme){
  const allowed = new Set(['solarpunk', 'paper', 'bloodmoon', 'davinci']);
  const th = String(theme || "").toLowerCase().trim();
  return allowed.has(th) ? th : null;
}

function applyTheme(theme){
  const th = sanitizeTheme(theme) || "davinci";
  document.documentElement.setAttribute("data-theme", th);
  // Theme choice can persist, but unlock does not.
  try { localStorage.setItem(THEME_KEY, th); } catch (e) {}
  if (themeSelect) themeSelect.value = th;
}

function setThemeUnlocked(unlocked){
  themeUnlocked = !!unlocked;
  if (themeControls) themeControls.classList.toggle("hidden", !themeUnlocked);
}

function isThemeUnlocked(){
  return !!themeUnlocked;
}

if (themeSelect){
  themeSelect.addEventListener("change", () => {
    // If someone somehow triggers this while locked, ignore.
    if (!isThemeUnlocked()) return;
    applyTheme(themeSelect.value);
  });
}


function openSecretModal(){
  if (!secretBackdrop) return;
  if (secretMsg) secretMsg.textContent = "";
  if (secretInput) secretInput.value = "";
  secretBackdrop.classList.remove("hidden");
  // Focus after paint
  setTimeout(() => { try { secretInput && secretInput.focus(); } catch(e){} }, 50);
}

function closeSecretModal(){
  if (!secretBackdrop) return;
  secretBackdrop.classList.add("hidden");
}

function submitSecretCode(){
  const code = String((secretInput && secretInput.value) || "").toUpperCase().trim().replace(/\s+/g," ");
  if (code !== "DA VINCI"){
    if (secretMsg) secretMsg.textContent = t("secretWrong");
    return;
  }
  setThemeUnlocked(true);
  applyTheme("davinci");
  closeSecretModal();
  alert(t("secretUnlocked"));
}

if (secretThemeBtn){
  // iOS Safari: touch events are more reliable than click on transparent elements.
  secretThemeBtn.addEventListener("click", (e) => { e.preventDefault(); openSecretModal(); });
  secretThemeBtn.addEventListener("touchend", (e) => { e.preventDefault(); openSecretModal(); }, {passive:false});
  secretThemeBtn.addEventListener("pointerup", (e) => { e.preventDefault(); openSecretModal(); });
}


// Extra: unlock gesture on the Rules button (more reliable than invisible button on some iOS setups)
(function(){
  const rb = el("rulesBtn");
  if (!rb) return;

  // Double-tap detector (touch)
  let lastTap = 0;
  rb.addEventListener("touchend", (e) => {
    const now = Date.now();
    const dt = now - lastTap;
    lastTap = now;
    if (dt > 0 && dt < 350){
      e.preventDefault();
      openSecretModal();
    }
  }, {passive:false});

  // Long-press detector (touch)
  let lpTimer = null;
  const startLP = () => { lpTimer = setTimeout(() => { openSecretModal(); }, 650); };
  const cancelLP = () => { if (lpTimer){ clearTimeout(lpTimer); lpTimer = null; } };

  rb.addEventListener("touchstart", (e) => { cancelLP(); startLP(); }, {passive:true});
  rb.addEventListener("touchmove", cancelLP, {passive:true});
  rb.addEventListener("touchcancel", cancelLP, {passive:true});
  rb.addEventListener("touchend", (e) => { cancelLP(); }, {passive:true});

  // Desktop fallback
  rb.addEventListener("dblclick", (e) => { e.preventDefault(); openSecretModal(); });
})();

// Secret modal listeners
if (secretBackdrop){
  secretBackdrop.addEventListener("click", (e) => {
    if (e.target === secretBackdrop) closeSecretModal();
  });
}
if (secretCancelBtn) secretCancelBtn.addEventListener("click", closeSecretModal);
if (secretOkBtn) secretOkBtn.addEventListener("click", submitSecretCode);
if (secretInput){
  secretInput.addEventListener("keydown", (e) => {
    if (e.key === "Enter") submitSecretCode();
    if (e.key === "Escape") closeSecretModal();
  });
}
document.addEventListener("keydown", (e) => {
  if (e.key === "Escape" && secretBackdrop && !secretBackdrop.classList.contains("hidden")) closeSecretModal();
});



  // Load theme + unlock state
  setThemeUnlocked(isThemeUnlocked());
  applyTheme((() => {
    try { return localStorage.getItem("uljez-theme"); }
    catch(e) { return null; }
  })() || "davinci");
// Init
  applyLanguageToUI();
  showSetup();
  // Kick the title animation after first paint (inside the app scope)
  requestAnimationFrame(() => { setTimeout(animateTitle, 120); });
})();

</script>
